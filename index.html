<script>

'use strict';

var BF  = 'blur(10px) saturate(155%) brightness(1.09)';
var BG  = 'rgba(255,255,255,0.07)';

var PILL_BG = 'rgba(255,255,255,0.09)';
var PILL_SH =
  'inset 0 1px 0 rgba(255,255,255,0.46),' +
  'inset 0 -0.5px 0 rgba(255,255,255,0.05),' +
  'inset 0 0 0 1px rgba(255,255,255,0.13),' +
  '0 4px 14px rgba(0,0,0,0.30)';

var DONE = 'lg-done';

function si(el,p,v){ el.style.setProperty(p,v,'important'); }

function clearBorders(el){
  ['border','border-top','border-right','border-bottom','border-left',
   'border-width','border-top-width','border-right-width',
   'border-bottom-width','border-left-width',
   'border-color','border-top-color','border-right-color',
   'border-bottom-color','border-left-color',
   'border-style','outline','outline-width','outline-color'].forEach(function(p){
    si(el, p,
      p.endsWith('-color')                         ? 'transparent' :
      p==='border-style'||p.startsWith('outline')  ? 'none' : '0px');
  });
}

function makeCard(el){
  clearBorders(el);
  si(el,'background',BG);
  si(el,'background-color','transparent');
  si(el,'backdrop-filter',BF);
  si(el,'-webkit-backdrop-filter',BF);
  si(el,'box-shadow',SH);
  si(el,'position','relative');
  si(el,'overflow','hidden');
  el.classList.add('lg-glass',DONE);
}

function makePill(el){
  clearBorders(el);
  si(el,'background',PILL_BG);
  si(el,'background-color','transparent');
  si(el,'backdrop-filter',PILL_BF);
  si(el,'-webkit-backdrop-filter',PILL_BF);
  si(el,'box-shadow',PILL_SH);
  si(el,'position','relative');
  si(el,'overflow','hidden');
  el.classList.add('lg-pill',DONE);
}

function sweep(){
  document.querySelectorAll('*:not(.'+DONE+')').forEach(function(el){
    var tag = el.tagName;
    if(!tag||'SCRIPT STYLE SVG ASIDE HTML BODY AUDIO HEAD META LINK NOSCRIPT'.split(' ').includes(tag)){
      el.classList.add(DONE); return;
    }

    var cn = typeof el.className==='string' ? el.className : '';
    var cs = el.style;

    // Hide icon tooltips
    if(cn.includes('group-hover:scale-100')||cn.includes('group-hover\:scale-100')){
      si(el,'display','none');
      el.classList.add(DONE); return;
    }

    // Skip absolutely-positioned / hidden overlays
    if(cn.includes('scale-0')||cn.includes('absolute')||cn.includes('fixed')){
      el.classList.add(DONE); return;
    }

    // Profile image ring
    if(tag==='IMG'){
      if(cn.includes('rounded')||cs.borderRadius){
        clearBorders(el);
        si(el,'box-shadow',
          '0 0 0 2.5px rgba(255,255,255,0.55),' +
          '0 0 0 5px rgba(255,255,255,0.12),' +
          '0 14px 38px rgba(0,0,0,0.60)');
      }
      el.classList.add(DONE); return;
    }

    // rhap_container — strip it; parent div.p-3 wrapper is the glass surface
    if(cn.includes('rhap_container')){
      clearBorders(el);
      si(el,'background','transparent');
      si(el,'background-color','transparent');
      si(el,'backdrop-filter','none');
      si(el,'-webkit-backdrop-filter','none');
      si(el,'box-shadow','none');
      si(el,'margin-top','0');
      si(el,'padding','8px 12px');
      el.classList.add(DONE); return;
    }

    // rhap children — clear dark backgrounds
    if(cn.includes('rhap_')&&!cn.includes('rhap_container')){
      if(!cn.includes('rhap_progress-filled')&&
         !cn.includes('rhap_progress-indicator')&&
         !cn.includes('rhap_volume-indicator')&&
         !cn.includes('rhap_volume-filled')){
        si(el,'background-color','transparent');
        si(el,'background','transparent');
      }
      el.classList.add(DONE); return;
    }

    var bw = cs.borderWidth  || '';
    var br = cs.borderRadius || '';
    var bg = cs.backgroundColor || '';
    var bf = cs.backdropFilter || cs.webkitBackdropFilter || '';

    var hasBW  = parseFloat(bw) > 0;
    var hasBR  = br!==''&&parseFloat(br)>0;
    var isPill = br.includes('9999');
    var hasBG  = bg&&bg!=='transparent'&&!bg.match(/rgba?\(\s*0,\s*0,\s*0,\s*0\s*\)/);
    var hasBF  = bf.includes('blur');

    // main-box: border from CSS class not inline
    if(cn.includes('main-box')){ makeCard(el); return; }

    // Social pills
    if(isPill&&(tag==='A'||tag==='BUTTON')){ makePill(el); return; }

    // Rectangular buttons/links
    if(!isPill&&(tag==='A'||tag==='BUTTON')&&(hasBW||hasBG)&&hasBR){ makePill(el); return; }

    // Cards: border + radius
    if(hasBW&&hasBR&&!isPill){ makeCard(el); return; }

    // Cards: backdrop-filter + radius (profile outer wrapper)
    if(hasBF&&hasBR){ makeCard(el); return; }

    // Cards: background + radius
    if(hasBG&&hasBR&&!isPill){ makeCard(el); return; }

    el.classList.add(DONE);
  });

  // Nuke styled-jsx dark rhap backgrounds
  ['.rhap_download-progress','.rhap_progress-bar-show-download','.rhap_volume-bar'].forEach(function(s){
    document.querySelectorAll(s).forEach(function(e){
      si(e,'background','rgba(255,255,255,0.13)');
      si(e,'background-color','rgba(255,255,255,0.13)');
    });
  });
}
